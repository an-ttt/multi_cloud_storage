name: multi_cloud_storage
description: A Flutter package that integrates Google Drive, iCloud, Dropbox, and OneDrive via their respective plugins.
version: 0.7.0
homepage: https://github.com/chris-wolf/multi_cloud_storage

environment:
  sdk: ">=2.19.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  googleapis: ^14.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  google_sign_in: ^7.1.1
  path: ^1.9.1
  http: ^1.6.0
  flutter_web_auth_2: ^5.0.2
  dio: ^5.9.2
  crypto: ^3.0.7
  flutter_secure_storage: ^10.3.1
  icloud_storage_sync: ^0.0.4
  googleapis_auth: ^2.3.1
  google_sign_in_all_platforms: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

screenshots:
  - description: 'Example cloud explorer'
    path: example/screenshots/Example_cloud_storage_explorer.jpg
